<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBoard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>TaskBoard</h1>
      <p>Basit görev takip uygulaması</p>
    </header>
    <main>
      <section class="dashboard-grid" aria-label="Görev Özeti">
        <article class="card">
          <h3>Toplam Görev</h3>
          <p id="total-count">5</p>
        </article>

        <article class="card">
          <h3>Açık Görev</h3>
          <p id="open-count">2</p>
        </article>

        <article class="card">
          <h3>Devam Eden</h3>
          <p id="progress-count">2</p>
        </article>

        <article class="card">
          <h3>Tamamlanan</h3>
          <p id="done-count">1</p>
        </article>
      </section>
      <section class="content-layout">
        <section class="card" aria-labelledby="task-list-title">
          <h2 id="task-list-title">Görevler</h2>
          <div class="filters">
            <label for="status-filter">Durum</label>

            <select id="status-filter">
              <option value="all">Tümü</option>
              <option value="open">Açık</option>
              <option value="done">Tamamlandı</option>
            </select>
            <label for="priority-filter">Öncelik</label>

            <select id="priority-filter">
              <option value="all">Tümü</option>
              <option value="high">Yüksek</option>
              <option value="normal">Normal</option>
              <option value="low">Düşük</option>
            </select>
          </div>
          <div class="table-wrapper">
            <table class="task-table">
              <thead>
                <tr>
                  <th>Başlık</th>
                  <th>Öncelik</th>
                  <th>Durum</th>
                  <th>Oluşturma Tarihi</th>
                  <th>İşlem</th>
                </tr>
              </thead>
              <tbody id="task-table-body"></tbody>
            </table>
          </div>
          <section class="empty-state" hidden>
            <h2>Henüz görev yok</h2>
            <p>İlk görevi ekleyerek panoyu başlat.</p>
          </section>
        </section>
        <section class="card" aria-labelledby="new-task-title">
          <h2 id="new-task-title">Yeni Görev</h2>
          <form id="task-form">
            <label for="task-title">Görev başlığı</label>
            <input
              type="text"
              id="task-title"
              name="title"
              placeholder="Görev başlığını giriniz"
              maxlength="80"
              required
            />
            <label for="priority">Öncelik</label>
            <select id="priority" name="priority">
              <option value="low">Düşük</option>
              <option value="normal">Normal</option>
              <option value="high">Yüksek</option>
            </select>
            <label for="description">Görev Açıklaması</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              placeholder="Görev açıklamasını yazınız"
            ></textarea>
            <button class="btn" type="submit">Ekle</button>
          </form>
        </section>
      </section>
    </main>
    <footer>
      <p>TaskBoard - Staj Projesi</p>
    </footer>
    <script src="js/app.js"></script>
  </body>
</html>
