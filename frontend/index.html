<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBoard</title>
  </head>
  <body>
    <header>
      <h1>TaskBoard</h1>
      <p>Basit görev takip uygulaması</p>
    </header>
    <main>
      <section aria-labelledby="task-list-title">
        <h2 id="task-list-title">Görevler</h2>
        <table>
          <thead>
            <tr>
              <th>Başlık</th>
              <th>Öncelik</th>
              <th>Durum</th>
              <th>Oluşturma Tarihi</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>HTML Formları</td>
              <td>Yüksek</td>
              <td>Devam Ediyor</td>
              <td>10.07.2026</td>
            </tr>
            <tr>
              <td>CSS Düzeni</td>
              <td>Normal</td>
              <td>Bekliyor</td>
              <td>10.07.2026</td>
            </tr>
            <tr>
              <td>JavaScript Başlangıç</td>
              <td>Düşük</td>
              <td>Tamamlandı</td>
              <td>10.07.2026</td>
            </tr>
          </tbody>
        </table>
      </section>
      <section aria-labelledby="new-task-title">
        <h2 id="new-task-title">Yeni Görev</h2>
        <form id="task-form">
          <label for="task-title">Görev başlığı</label>
          <input
            type="text"
            id="task-title"
            name="title"
            placeholder="Görev başlığını giriniz"
            maxlength="80"
            required
          />
          <label for="priority">Öncelik</label>
          <select id="priority" name="priority">
            <option value="low">Düşük</option>
            <option value="normal">Normal</option>
            <option value="high">Yüksek</option>
          </select>
          <label for="description">Görev Açıklaması</label>
          <textarea
            id="description"
            name="description"
            rows="4"
            placeholder="Görev açıklamasını yazınız"
          ></textarea>
          <button type="submit">Ekle</button>
        </form>
      </section>
    </main>
    <footer>
      <p>TaskBoard - Staj Projesi</p>
    </footer>
  </body>
</html>
